<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Trening Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600;900&display=swap');
        
        :root { --brand-yellow: #facc15; --brand-black: #000000; }

        html, body {
            overflow: hidden; height: 100%; width: 100%; position: fixed;
            background-color: var(--brand-black); font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent; touch-action: pan-y;
            user-select: none; -webkit-user-select: none;
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        }

        #app { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .font-digit { font-family: 'Orbitron', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input { user-select: text; -webkit-user-select: text; }

        .edit-input {
            background: transparent; border: none; color: white; font-weight: 900;
            text-transform: uppercase; font-style: italic; width: 100%; outline: none;
        }

        .nav-active { color: var(--brand-yellow); border-bottom: 3px solid var(--brand-yellow); }

        .serie-input {
            background-color: #0c0c0c; border: 1px solid #1f1f23; border-radius: 0.75rem;
            padding: 0.85rem 0.5rem; text-align: center; font-weight: 900;
            font-size: 0.9rem; color: white; outline: none;
        }

        .scroll-container {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding-bottom: 120px; overscroll-behavior-y: contain;
        }

        /* Poprawione style okna edycji pod iPhone */
        .modal-overlay { background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); }
        .modal-content {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .app-card { background: rgba(28, 28, 30, 0.6); border: 1px solid rgba(44, 44, 46, 0.8); }
    </style>
</head>
<body class="text-slate-100">
    <div id="app" class="max-w-md mx-auto"></div>

    <!-- Timer Edit Modal - POPRAWIONY UKŁAD -->
    <div id="timer-modal" class="hidden fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-6">
        <div class="modal-content p-8 rounded-[2.5rem] w-full max-w-[320px]">
            <h3 class="text-center font-black uppercase italic text-yellow-400 mb-8 tracking-[0.15em] text-[10px]">Ustaw czas przerwy</h3>
            
            <div class="bg-black border border-zinc-800 flex items-center justify-center gap-3 mb-8 py-6 rounded-2xl">
                <input id="timer-input" type="number" pattern="[0-9]*" inputmode="numeric" 
                       class="w-24 bg-transparent text-right font-digit text-4xl font-black text-white outline-none" 
                       placeholder="180">
                <span class="font-black text-zinc-500 italic uppercase text-[10px] pr-2">Sek</span>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="confirmTimerEdit()" class="w-full py-5 bg-yellow-400 text-black rounded-2xl font-black uppercase text-[11px] italic shadow-lg active:scale-95 transition-all">Zapisz ustawienia</button>
                <button onclick="closeTimerModal()" class="w-full py-4 bg-transparent text-zinc-500 rounded-2xl font-black uppercase text-[10px] tracking-widest active:opacity-50 transition-all">Anuluj</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'iphone_v2_storage';
        const defaultPlan = {
            'TRENING A': ['Przysiad', 'Podciąganie', 'Rozpiętki skos', 'Y-Raise skos', 'Łydki'],
            'TRENING B': ['Martwy ciąg', 'Dipy', 'Wyciskanie hantle', 'Biceps 7x7x7', 'Zwis brzuch'],
            'TRENING C': ['Klata płaska', 'Wiosłowanie', 'Wykroki', 'Barki wznosy', 'Triceps wyciąg']
        };

        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            mainTab: 'TRENING', workouts: {}, history: [],
            activeWorkoutType: 'TRENING A', timeLeft: 180, defaultRestTime: 180 
        };

        let timerInterval = null;
        let timerEnd = null;

        if (!Object.keys(state.workouts).length) {
            for (let t in defaultPlan) state.workouts[t] = defaultPlan[t].map(name => ({ name, s1: '', s2: '', s3: '' }));
        }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        function format(s) {
            const m = Math.floor(Math.max(0, s) / 60);
            const sec = Math.max(0, s) % 60;
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function updateTUI() {
            const d = document.getElementById('timer-display');
            if (d) d.innerText = format(state.timeLeft);
            const b = document.getElementById('timer-start-btn');
            if (b) b.innerHTML = timerEnd ? '⏸' : '▶';
        }

        function startT(s) {
            if (timerEnd && !s) { clearInterval(timerInterval); timerEnd = null; updateTUI(); return; }
            const duration = s || state.timeLeft || state.defaultRestTime;
            state.timeLeft = duration;
            timerEnd = Date.now() + (duration * 1000);
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const rem = Math.round((timerEnd - Date.now()) / 1000);
                if (rem <= 0) { state.timeLeft = 0; timerEnd = null; clearInterval(timerInterval); }
                else { state.timeLeft = rem; }
                updateTUI();
            }, 1000);
            updateTUI();
        }

        function openTimerModal() { 
            document.getElementById('timer-input').value = state.defaultRestTime;
            document.getElementById('timer-modal').classList.remove('hidden');
        }
        function closeTimerModal() { document.getElementById('timer-modal').classList.add('hidden'); }
        function confirmTimerEdit() {
            const v = parseInt(document.getElementById('timer-input').value);
            if (v > 0) { state.defaultRestTime = v; if(!timerEnd) state.timeLeft = v; save(); render(); }
            closeTimerModal();
        }

        function duplicate(w, i) {
            const ex = state.workouts[w][i];
            let val = ex.s3 || ex.s2 || ex.s1;
            if (!val) return;
            if (!ex.s1) ex.s1 = val; else if (!ex.s2) ex.s2 = val; else ex.s3 = val;
            save(); render();
        }

        function saveSession() {
            const cur = state.workouts[state.activeWorkoutType];
            if (!cur.some(e => e.s1 || e.s2 || e.s3)) return;
            state.history.unshift({
                id: Date.now(), date: new Date().toLocaleString('pl-PL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }),
                type: state.activeWorkoutType, exercises: JSON.parse(JSON.stringify(cur))
            });
            state.workouts[state.activeWorkoutType].forEach(e => { e.s1=''; e.s2=''; e.s3=''; });
            state.mainTab = 'HISTORIA'; save(); render();
        }

        function render() {
            const app = document.getElementById('app');
            let html = `
                <nav class="flex bg-black border-b border-zinc-900 shrink-0">
                    <button onclick="state.mainTab='TRENING'; render();" class="flex-1 py-5 text-[11px] font-black uppercase ${state.mainTab === 'TRENING' ? 'nav-active text-yellow-400' : 'text-zinc-600'}">Trening</button>
                    <button onclick="state.mainTab='HISTORIA'; render();" class="flex-1 py-5 text-[11px] font-black uppercase ${state.mainTab === 'HISTORIA' ? 'nav-active text-yellow-400' : 'text-zinc-600'}">Historia</button>
                </nav>
                <div class="scroll-container p-4 no-scrollbar">`;

            if (state.mainTab === 'TRENING') {
                html += `
                    <div class="mb-6 p-6 rounded-[2rem] border border-zinc-900 bg-zinc-900/10 flex flex-col items-center">
                        <span class="text-[8px] font-black text-zinc-600 uppercase mb-1 tracking-[0.2em]">Odpoczynek</span>
                        <div id="timer-display" onclick="openTimerModal()" class="text-6xl font-digit font-black mb-4 text-white">${format(state.timeLeft)}</div>
                        <div class="flex gap-4">
                            <button id="timer-start-btn" onclick="startT()" class="w-16 h-16 rounded-2xl bg-yellow-400 text-black text-2xl font-bold active:scale-95 transition-all">▶</button>
                            <button onclick="state.timeLeft=state.defaultRestTime; timerEnd=null; clearInterval(timerInterval); updateTUI();" class="w-16 h-16 rounded-2xl bg-zinc-900 text-zinc-500 font-bold border border-zinc-800 active:scale-95 transition-all">↺</button>
                        </div>
                    </div>
                    <div class="flex justify-center gap-2 mb-8">
                        ${['TRENING A', 'TRENING B', 'TRENING C'].map(t => `<button onclick="state.activeWorkoutType='${t}'; render();" class="px-5 py-3 rounded-xl text-[10px] font-black border uppercase ${state.activeWorkoutType===t?'bg-yellow-400 text-black border-yellow-400':'bg-zinc-900 text-zinc-600 border-zinc-800'}">${t}</button>`).join('')}
                    </div>
                    <div class="space-y-6">
                        ${state.workouts[state.activeWorkoutType].map((ex, i) => `
                            <div class="app-card p-5 rounded-3xl">
                                <div class="flex justify-between items-center mb-5">
                                    <input type="text" value="${ex.name}" onchange="state.workouts['${state.activeWorkoutType}'][${i}].name=this.value; save();" class="edit-input border-l-4 border-yellow-400 pl-3 text-sm">
                                    <div class="flex gap-2">
                                        <button onclick="duplicate('${state.activeWorkoutType}', ${i})" class="w-10 h-10 bg-zinc-900 rounded-xl text-zinc-500 border border-zinc-800 flex items-center justify-center">📋</button>
                                        <button onclick="startT(state.defaultRestTime)" class="w-10 h-10 bg-yellow-400/10 rounded-xl text-yellow-400 border border-yellow-400/20 flex items-center justify-center">⏱</button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-3">
                                    ${[1,2,3].map(n => `<input type="text" placeholder="--" value="${ex['s'+n]}" oninput="state.workouts['${state.activeWorkoutType}'][${i}].s${n}=this.value; save();" class="serie-input w-full">`).join('')}
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="saveSession()" class="w-full bg-yellow-400 py-6 rounded-3xl font-black text-black uppercase italic shadow-2xl active:scale-95 transition-all mb-10">Zapisz trening</button>
                    </div>`;
            } else {
                html += `
                    <div class="space-y-4">
                        ${state.history.length === 0 ? '<div class="py-20 text-center opacity-10 font-black italic uppercase">Brak sesji</div>' : state.history.map(h => `
                            <div class="bg-zinc-950 rounded-3xl border border-zinc-900 overflow-hidden shadow-lg">
                                <div class="bg-zinc-900/50 p-5 flex justify-between items-center border-b border-zinc-800">
                                    <div><span class="text-[10px] font-black text-yellow-400 uppercase block tracking-tighter">${h.type}</span><span class="text-[9px] text-zinc-600 font-bold">${h.date}</span></div>
                                    <button onclick="if(confirm('Usunąć?')){state.history=state.history.filter(it=>it.id!==${h.id}); save(); render();}" class="text-zinc-800 px-2 text-xl">&times;</button>
                                </div>
                                <div class="p-5 space-y-3">
                                    ${h.exercises.map(e => `<div class="flex justify-between text-[11px] border-b border-zinc-900/40 pb-2 last:border-0"><span class="text-zinc-500 italic text-[10px]">${e.name}</span><span class="font-black text-white">${[e.s1,e.s2,e.s3].filter(v=>v).join(' | ') || '-'}</span></div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
            }
            html += `</div>`;
            app.innerHTML = html;
            updateTUI();
        }

        window.onload = render;
    </script>
</body>
</html>

```
