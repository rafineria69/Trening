<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-title" content="Trening Pro">

    <title>Trening Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600;900&display=swap');
        
        :root { 
            --brand-yellow: #facc15; 
            --brand-black: #000000; 
        }

        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--brand-black); font-family: 'Inter', sans-serif;
            color: #f1f5f9; overflow: hidden; position: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        #app {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        nav { flex-shrink: 0; display: flex; background: #09090b; border-bottom: 1px solid #18181b; }

        .scroll-container {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 1rem; display: flex; flex-direction: column;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .font-digit { font-family: 'Orbitron', sans-serif; }
        
        /* Poprawione pole nazwy ćwiczenia */
        .exercise-title-input {
            background: transparent; border: none; color: white; 
            font-weight: 900; text-transform: uppercase; font-style: italic;
            outline: none; flex: 1; min-width: 0; /* min-width: 0 pozwala na prawidłowe działanie flex-grow */
            font-size: 0.875rem; line-height: 1.25rem;
        }

        .nav-active { color: var(--brand-yellow); border-bottom: 3px solid var(--brand-yellow); }

        .app-card { 
            background: rgba(24, 24, 27, 0.6); border: 1px solid #27272a;
            backdrop-filter: blur(10px); border-radius: 1.5rem; padding: 1rem; margin-bottom: 0.75rem;
        }

        .serie-input {
            background: #09090b; border: 1px solid #18181b; border-radius: 0.75rem;
            padding: 0.75rem 0.25rem; text-align: center; font-weight: 900;
            color: white; font-size: 1rem; width: 100%; outline: none;
        }
        
        .serie-input:focus { border-color: var(--brand-yellow); }

        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; padding: 2rem;
        }

        .modal-content {
            background: #121214; border: 1px solid #27272a; padding: 2rem;
            border-radius: 2.5rem; width: 100%; max-width: 320px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Timer Modal -->
    <div id="timer-modal" class="hidden modal-overlay">
        <div class="modal-content">
            <h3 class="text-center font-black uppercase italic text-yellow-400 mb-6 tracking-widest text-[10px]">Przerwa</h3>
            <div class="bg-black border-2 border-zinc-800 flex items-center justify-center gap-2 mb-8 p-6 rounded-3xl">
                <input id="timer-input" type="number" pattern="[0-9]*" inputmode="numeric" 
                       class="w-32 bg-transparent text-center font-digit text-4xl font-black text-white" 
                       placeholder="180">
                <span class="font-black text-zinc-600 italic uppercase text-[10px]">Sek</span>
            </div>
            <div class="flex gap-4">
                <button onclick="closeTimerModal()" class="flex-1 py-4 bg-zinc-800 text-zinc-400 rounded-2xl font-black uppercase text-[10px]">Anuluj</button>
                <button onclick="confirmTimerEdit()" class="flex-1 py-4 bg-yellow-400 text-black rounded-2xl font-black uppercase text-[10px] italic">Zapisz</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'iphone_max_workout_v4';
        const defaultPlan = {
            'TRENING A': ['Przysiad', 'Podciąganie', 'Rozpiętki skos', 'Y-Raise skos', 'Łydki'],
            'TRENING B': ['Martwy ciąg', 'Dipy', 'Wyciskanie hantle', 'Biceps 7x7x7', 'Zwis brzuch'],
            'TRENING C': ['Klata płaska', 'Wiosłowanie', 'Wykroki', 'Barki wznosy', 'Triceps wyciąg']
        };

        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            mainTab: 'TRENING', workouts: {}, history: [],
            activeWorkoutType: 'TRENING A', timeLeft: 180, defaultRestTime: 180 
        };

        let timerInterval = null;
        let timerEnd = null;

        if (!Object.keys(state.workouts).length) {
            for (let t in defaultPlan) state.workouts[t] = defaultPlan[t].map(name => ({ name, s1: '', s2: '', s3: '' }));
        }

        const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

        const format = (s) => {
            const m = Math.floor(Math.max(0, s) / 60);
            const sec = Math.max(0, s) % 60;
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        };

        const updateTUI = () => {
            const d = document.getElementById('timer-display');
            if (d) d.innerText = format(state.timeLeft);
            const b = document.getElementById('timer-start-btn');
            if (b) b.innerHTML = timerEnd ? '⏸' : '▶';
        };

        const startT = (s) => {
            if (timerEnd && !s) { clearInterval(timerInterval); timerEnd = null; updateTUI(); return; }
            const duration = s || state.timeLeft || state.defaultRestTime;
            state.timeLeft = duration;
            timerEnd = Date.now() + (duration * 1000);
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const rem = Math.round((timerEnd - Date.now()) / 1000);
                if (rem <= 0) { state.timeLeft = 0; timerEnd = null; clearInterval(timerInterval); }
                else { state.timeLeft = rem; }
                updateTUI();
            }, 1000);
            updateTUI();
        };

        const openTimerModal = () => { 
            document.getElementById('timer-input').value = state.defaultRestTime;
            document.getElementById('timer-modal').classList.remove('hidden');
        };
        const closeTimerModal = () => document.getElementById('timer-modal').classList.add('hidden');
        const confirmTimerEdit = () => {
            const v = parseInt(document.getElementById('timer-input').value);
            if (v > 0) { state.defaultRestTime = v; if(!timerEnd) state.timeLeft = v; save(); render(); }
            closeTimerModal();
        };

        const duplicate = (w, i) => {
            const ex = state.workouts[w][i];
            let val = ex.s3 || ex.s2 || ex.s1;
            if (!val) return;
            if (!ex.s1) ex.s1 = val; else if (!ex.s2) ex.s2 = val; else ex.s3 = val;
            save(); render();
        };

        const saveSession = () => {
            const cur = state.workouts[state.activeWorkoutType];
            if (!cur.some(e => e.s1 || e.s2 || e.s3)) return;
            state.history.unshift({
                id: Date.now(), date: new Date().toLocaleString('pl-PL'),
                type: state.activeWorkoutType, exercises: JSON.parse(JSON.stringify(cur))
            });
            state.workouts[state.activeWorkoutType].forEach(e => { e.s1=''; e.s2=''; e.s3=''; });
            state.mainTab = 'HISTORIA'; save(); render();
        };

        const render = () => {
            const app = document.getElementById('app');
            let html = `
                <nav>
                    <button onclick="state.mainTab='TRENING'; render();" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${state.mainTab === 'TRENING' ? 'nav-active text-yellow-400' : 'text-zinc-600'}">Trening</button>
                    <button onclick="state.mainTab='HISTORIA'; render();" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${state.mainTab === 'HISTORIA' ? 'nav-active text-yellow-400' : 'text-zinc-600'}">Historia</button>
                </nav>
                <div class="scroll-container no-scrollbar">`;

            if (state.mainTab === 'TRENING') {
                html += `
                    <!-- Timer Row -->
                    <div class="flex items-center justify-between bg-zinc-900/40 p-4 rounded-3xl border border-zinc-800 mb-4 shrink-0">
                        <div onclick="openTimerModal()" class="flex flex-col">
                            <span class="text-[7px] font-black text-zinc-600 uppercase mb-1">Przerwa</span>
                            <div id="timer-display" class="text-4xl font-digit font-black text-white leading-none tracking-tighter">${format(state.timeLeft)}</div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="state.timeLeft=state.defaultRestTime; timerEnd=null; clearInterval(timerInterval); updateTUI();" class="w-12 h-12 rounded-2xl bg-zinc-900 text-zinc-500 border border-zinc-800 flex items-center justify-center">↺</button>
                            <button id="timer-start-btn" onclick="startT()" class="w-12 h-12 rounded-2xl bg-yellow-400 text-black text-xl flex items-center justify-center">▶</button>
                        </div>
                    </div>

                    <!-- Tabs -->
                    <div class="flex gap-2 mb-4 shrink-0">
                        ${['TRENING A', 'TRENING B', 'TRENING C'].map(t => `<button onclick="state.activeWorkoutType='${t}'; render();" class="flex-1 py-3 rounded-xl text-[9px] font-black border uppercase ${state.activeWorkoutType===t?'bg-yellow-400 text-black border-yellow-400':'bg-zinc-900 text-zinc-600 border-zinc-800'}">${t}</button>`).join('')}
                    </div>

                    <!-- Exercises -->
                    <div class="space-y-3">
                        ${state.workouts[state.activeWorkoutType].map((ex, i) => `
                            <div class="app-card">
                                <div class="flex justify-between items-center mb-4 gap-3">
                                    <input type="text" value="${ex.name}" onchange="state.workouts['${state.activeWorkoutType}'][${i}].name=this.value; save();" class="exercise-title-input border-l-4 border-yellow-400 pl-3">
                                    <div class="flex gap-2 shrink-0">
                                        <button onclick="duplicate('${state.activeWorkoutType}', ${i})" class="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800 text-zinc-500">📋</button>
                                        <button onclick="startT(state.defaultRestTime)" class="w-10 h-10 bg-yellow-400/10 rounded-xl flex items-center justify-center border border-yellow-400/20 text-yellow-400">⏱</button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-3">
                                    ${[1,2,3].map(n => `<input type="text" placeholder="--" value="${ex['s'+n]}" oninput="state.workouts['${state.activeWorkoutType}'][${i}].s${n}=this.value; save();" class="serie-input">`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <button onclick="saveSession()" class="w-full bg-yellow-400 py-6 rounded-3xl font-black text-black uppercase italic shadow-2xl active:scale-[0.98] transition-all mt-6 mb-4">Zakończ trening</button>
                `;
            } else {
                html += `
                    <div class="flex gap-2 mb-4">
                        <button onclick="const b=new Blob([JSON.stringify(state)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='backup.json'; a.click();" class="flex-1 bg-zinc-900 py-4 rounded-xl text-[9px] font-black uppercase border border-zinc-800 text-zinc-500">Kopia</button>
                        <label class="flex-1 bg-zinc-900 py-4 rounded-xl text-[9px] font-black uppercase border border-zinc-800 text-center text-zinc-500 cursor-pointer">Wczytaj<input type="file" class="hidden" onchange="const r=new FileReader(); r.onload=(e)=>{state=JSON.parse(e.target.result); save(); render();}; r.readAsText(this.files[0]);"></label>
                    </div>
                    <div class="space-y-4">
                        ${state.history.length === 0 ? '<div class="py-20 text-center opacity-10 font-black italic uppercase">Pusta historia</div>' : state.history.map(h => `
                            <div class="bg-zinc-950 rounded-3xl border border-zinc-900 overflow-hidden">
                                <div class="bg-zinc-900/50 p-5 flex justify-between items-center border-b border-zinc-800">
                                    <div><span class="text-[10px] font-black text-yellow-400 uppercase block">${h.type}</span><span class="text-[9px] text-zinc-600 font-bold">${h.date}</span></div>
                                    <button onclick="if(confirm('Usunąć?')){state.history=state.history.filter(it=>it.id!==${h.id}); save(); render();}" class="text-zinc-800 px-3 text-2xl">&times;</button>
                                </div>
                                <div class="p-5 space-y-3">
                                    ${h.exercises.map(e => `<div class="flex justify-between text-[11px] border-b border-zinc-800/40 pb-2 last:border-0"><span class="text-zinc-500 italic">${e.name}</span><span class="font-black text-white">${[e.s1,e.s2,e.s3].filter(v=>v).join(' | ') || '-'}</span></div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
            }
            html += `</div>`;
            app.innerHTML = html;
            updateTUI();
        };

        window.onload = render;
    </script>
</body>
</html>

```
